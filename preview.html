<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document Preview | eduLEARN.ug</title>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Outfit', sans-serif; margin: 0; background: #F8FAF9; color: #1A1C1E; }
        .nav-back { padding: 15px; display: block; text-decoration: none; color: #27ae60; font-weight: 600; }
        .container { max-width: 800px; margin: 0 auto; padding: 20px; }
        
        /* The Full Document Viewer */
        .viewer-container { width: 100%; height: 600px; background: #fff; border-radius: 20px; box-shadow: 0 10px 30px rgba(0,0,0,0.05); overflow: hidden; margin-bottom: 30px; }
        iframe { width: 100%; height: 100%; border: none; }

        .doc-details { margin-bottom: 40px; }
        .action-bar { display: flex; gap: 10px; margin-top: 20px; }
        .btn { flex: 1; padding: 15px; text-align: center; border-radius: 12px; text-decoration: none; font-weight: 600; color: white; }
        .btn-dl { background: #27ae60; }
        .btn-wa { background: #25D366; }

        .related-section { margin-top: 50px; border-top: 2px solid #EEE; pt: 30px; }
        .related-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; margin-top: 20px; }
        .small-card { background: white; padding: 10px; border-radius: 15px; text-decoration: none; color: inherit; font-size: 12px; border: 1px solid #E9ECEF; }
    </style>
</head>
<body>

<a href="index.html" class="nav-back">← Back to Library</a>

<div class="container">
    <div class="doc-details">
        <h1 id="doc-title">Loading...</h1>
        <p id="doc-meta" style="color: gray;"></p>
        
        <div class="viewer-container">
            <iframe id="pdf-viewer" src=""></iframe>
        </div>

        <div class="action-bar">
            <a id="dl-btn" href="#" class="btn btn-dl">Download PDF</a>
            <a id="wa-btn" href="#" class="btn btn-wa">Share to WhatsApp</a>
        </div>
    </div>

    <div class="related-section">
        <h3>Related Study Materials</h3>
        <div id="related-grid" class="related-grid">
            </div>
    </div>
</div>

<script>
    // This is a copy of your main data (You should eventually move this to a separate file)
    const papers = [
        { id: 1, name: "UACE Biology Paper 1", subject: "Biology", level: "S.6 UACE", file: "pdfs/UACE_BIO_I.pdf" },
        { id: 2, name: "S.4 Mathematics Paper 1", subject: "Mathematics", level: "S.4 UCE", file: "pdfs/math_s4.pdf" },
        { id: 3, name: "UACE Biology Paper 2", subject: "Biology", level: "S.6 UACE", file: "pdfs/bio_p2.pdf" }
    ];

    // Get the ID from the URL (e.g., preview.html?id=1)
    const params = new URLSearchParams(window.location.search);
    const docId = parseInt(params.get('id'));
    const currentDoc = papers.find(p => p.id === docId);

    if (currentDoc) {
        document.getElementById('doc-title').innerText = currentDoc.name;
        document.getElementById('doc-meta').innerText = `${currentDoc.level} • ${currentDoc.subject}`;
        document.getElementById('pdf-viewer').src = currentDoc.file;
        document.getElementById('dl-btn').href = currentDoc.file;
        
        // WhatsApp Share
        const shareMsg = encodeURIComponent(`I found this ${currentDoc.name} on eduLEARN.ug! View it here: ${window.location.href}`);
        document.getElementById('wa-btn').href = `https://api.whatsapp.com/send?text=${shareMsg}`;

        // Show Related Papers (Papers with same subject)
        const related = papers.filter(p => p.subject === currentDoc.subject && p.id !== docId);
        const relatedGrid = document.getElementById('related-grid');
        
        if(related.length > 0) {
            relatedGrid.innerHTML = related.map(p => `
                <a href="preview.html?id=${p.id}" class="small-card">
                    <strong>${p.name}</strong><br>
                    <span style="color: #27ae60">${p.level}</span>
                </a>
            `).join('');
        } else {
            relatedGrid.innerHTML = "<p>No related papers found yet.</p>";
        }
    }
</script>
</body>
</html>
