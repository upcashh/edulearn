<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Preview | eduLEARN.ug</title>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;600&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Outfit', sans-serif; margin: 0; background: #F8FAF9; text-align: center; }
        .header { padding: 15px; background: white; border-bottom: 1px solid #eee; display: flex; align-items: center; }
        .back-btn { text-decoration: none; color: #27ae60; font-weight: 600; padding: 10px; }
        .container { max-width: 800px; margin: 0 auto; padding: 20px; }
        
        /* The PDF Viewer */
        .viewer-box { width: 100%; height: 500px; background: white; border-radius: 20px; box-shadow: 0 5px 15px rgba(0,0,0,0.1); overflow: hidden; margin-top: 20px; }
        iframe { width: 100%; height: 100%; border: none; }

        .btn-row { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; margin-top: 25px; }
        .btn { padding: 15px; border-radius: 12px; text-decoration: none; font-weight: 600; color: white; }
        .btn-wa { background: #25D366; }
        .btn-dl { background: #27ae60; }
    </style>
</head>
<body>

<div class="header">
    <a href="index.html" class="back-btn">← Back</a>
    <span style="flex-grow: 1; font-weight: 600;">Document Viewer</span>
</div>

<div class="container">
    <h1 id="title">Loading...</h1>
    
    <div class="viewer-box">
        <iframe id="pdf-frame" src=""></iframe>
    </div>

    <div class="btn-row">
        <a id="wa-share" href="#" class="btn btn-wa">Share to WhatsApp</a>
        <a id="dl-link" href="#" download class="btn btn-dl">Download PDF</a>
    </div>
</div>

<script>
    const papers = [
        { id: 1, name: "UACE Biology Paper 1", file: "pdfs/UACE_BIO_I.pdf" }
    ];

    const params = new URLSearchParams(window.location.search);
    const id = parseInt(params.get('id'));
    const doc = papers.find(p => p.id === id);

    if (doc) {
        document.getElementById('title').innerText = doc.name;
        
        // This is the trick: It tells Google to display your PDF inside your site
        const websiteUrl = window.location.href.split('preview.html')[0];
        const fullPdfPath = websiteUrl + doc.file;
        document.getElementById('pdf-frame').src = `https://docs.google.com/viewer?url=${fullPdfPath}&embedded=true`;
        
        document.getElementById('dl-link').href = doc.file;
        
        const shareText = encodeURIComponent(`View ${doc.name} here: ${window.location.href}`);
        document.getElementById('wa-share').href = `https://api.whatsapp.com/send?text=${shareText}`;
    }
</script>
</body>
</html>
