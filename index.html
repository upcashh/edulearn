<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>eduLEARN.ug | Home</title>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #4F46E5;
            --bg: #F8FAFC;
            --card: #ffffff;
            --text: #0F172A;
            --sub-text: #64748B;
            --nav-bg: rgba(255, 255, 255, 0.9);
        }

        body { 
            font-family: 'Outfit', sans-serif; 
            background: var(--bg); 
            margin: 0; color: var(--text);
            padding-bottom: 80px; /* Space for bottom nav */
        }

        /* Top Header */
        header {
            padding: 20px;
            background: var(--card);
            border-bottom: 1px solid #E2E8F0;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .user-profile {
            width: 35px; height: 35px;
            background: #E2E8F0;
            border-radius: 50%;
            display: flex; align-items: center; justify-content: center;
        }

        /* Hero Section */
        .hero { padding: 25px 20px; }
        .hero h1 { font-size: 24px; margin: 0 0 10px; }
        .hero p { color: var(--sub-text); margin: 0; font-size: 15px; }

        .search-bar {
            background: var(--card);
            margin-top: 20px;
            padding: 12px 20px;
            border-radius: 100px;
            display: flex;
            align-items: center;
            box-shadow: 0 4px 6px -1px rgba(0,0,0,0.05);
            border: 1px solid #E2E8F0;
        }

        .search-bar input {
            border: none; outline: none; width: 100%; font-size: 16px; margin-left: 10px;
        }

        /* Categories/Horizontal Scroll */
        .section-title { padding: 0 20px; font-weight: 600; display: flex; justify-content: space-between; }
        .horizontal-scroll {
            display: flex; overflow-x: auto; padding: 15px 20px; gap: 15px;
            scrollbar-width: none;
        }
        .horizontal-scroll::-webkit-scrollbar { display: none; }

        .feature-card {
            min-width: 200px; background: var(--primary); color: white;
            padding: 20px; border-radius: 20px; position: relative;
        }

        /* Bottom Toolbar */
        .bottom-nav {
            position: fixed; bottom: 0; width: 100%; height: 70px;
            background: var(--nav-bg); backdrop-filter: blur(10px);
            border-top: 1px solid #E2E8F0;
            display: flex; justify-content: space-around; align-items: center;
            z-index: 1000;
        }

        .nav-item {
            display: flex; flex-direction: column; align-items: center;
            text-decoration: none; color: var(--sub-text); font-size: 11px;
            gap: 4px;
        }
        .nav-item.active { color: var(--primary); font-weight: 600; }
        
        .nav-icon { width: 24px; height: 24px; }
    </style>
</head>
<body>

<header>
    <div style="font-weight: 700; font-size: 20px;">eduLEARN<span style="color:var(--primary)">.ug</span></div>
    <div class="user-profile">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"></path><circle cx="12" cy="7" r="4"></circle></svg>
    </div>
</header>

<div class="hero">
    <h1>Transform the way you study</h1>
    <p>Unlock exclusive materials and stay ahead.</p>
    
    <div class="search-bar">
        <svg width="20" height="20" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><circle cx="11" cy="11" r="8"></circle><path d="m21 21-4.35-4.35"></path></svg>
        <input type="text" placeholder="Search for courses, papers...">
    </div>
</div>

<div class="section-title">
    <span>Continue Reading</span>
    <span style="color:var(--primary); font-size: 14px;">See all</span>
</div>

<div class="horizontal-scroll">
    <div class="feature-card">
        <div style="font-size: 13px; opacity: 0.8;">S.6 Biology</div>
        <div style="font-size: 18px; font-weight: 600; margin-top: 10px;">UACE Mocks 2025</div>
    </div>
    <div class="feature-card" style="background: #10B981;">
        <div style="font-size: 13px; opacity: 0.8;">P.7 PLE</div>
        <div style="font-size: 18px; font-weight: 600; margin-top: 10px;">Mathematics 2024</div>
    </div>
</div>

<nav class="bottom-nav">
    <a href="#" class="nav-item active">
        <svg class="nav-icon" fill="currentColor" viewBox="0 0 24 24"><path d="M10 20v-6h4v6h5v-8h3L12 3 2 12h3v8z"/></svg>
        <span>Home</span>
    </a>
    <a href="#" class="nav-item">
        <svg class="nav-icon" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M4 19.5A2.5 2.5 0 0 1 6.5 17H20"></path><path d="M6.5 2H20v20H6.5A2.5 2.5 0 0 1 4 19.5v-15A2.5 2.5 0 0 1 6.5 2z"></path></svg>
        <span>My Library</span>
    </a>
    <a href="#" class="nav-item">
        <svg class="nav-icon" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><circle cx="11" cy="11" r="8"></circle><path d="m21 21-4.35-4.35"></path></svg>
        <span>Discovery</span>
    </a>
    <a href="#" class="nav-item">
        <svg class="nav-icon" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"></path></svg>
        <span>AI Tutor</span>
    </a>
</nav>

</body>
</html>
