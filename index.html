<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="theme-color" id="nav-theme" content="#F8FAF9">
    <title>eduLEARN | Uganda's Digital Library</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600&display=swap" rel="stylesheet">
    <link href="https://unpkg.com/aos@2.3.1/dist/aos.css" rel="stylesheet">
    
    <style>
        :root {
            --bg-color: #F8FAF9;
            --card-bg: #ffffff;
            --text-main: #1A1C1E;
            --text-sub: #6C757D;
            --accent: #27ae60;
            --input-bg: #ffffff;
            --border-color: #E9ECEF;
            --shadow: 0 10px 30px rgba(0,0,0,0.05);
        }

        [data-theme="dark"] {
            --bg-color: #0F172A;
            --card-bg: #1E293B;
            --text-main: #F8FAFC;
            --text-sub: #94A3B8;
            --accent: #4ADE80;
            --input-bg: #1E293B;
            --border-color: #334155;
            --shadow: 0 10px 30px rgba(0,0,0,0.3);
        }

        * { box-sizing: border-box; transition: background 0.3s, color 0.3s; }
        
        body { 
            font-family: 'Outfit', sans-serif; 
            background-color: var(--bg-color); 
            margin: 0; padding: 0; color: var(--text-main);
            overflow-x: hidden;
        }

        /* Scrollable Header */
        header {
            padding: 40px 20px;
            text-align: center;
            background: transparent;
        }

        .logo-container {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 10px;
            margin-bottom: 20px;
        }

        /* Animated SVG Logo */
        .edu-icon {
            width: 80px; height: 80px;
            fill: var(--accent);
            animation: float 3s ease-in-out infinite;
        }

        @keyframes float {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-10px); }
        }

        .logo-text { font-size: 32px; font-weight: 600; letter-spacing: -1px; }

        /* Theme Toggle Button */
        .theme-toggle {
            position: fixed;
            bottom: 30px;
            right: 30px;
            width: 50px; height: 50px;
            border-radius: 50%;
            background: var(--accent);
            border: none;
            cursor: pointer;
            z-index: 1000;
            box-shadow: 0 5px 15px rgba(0,0,0,0.2);
            display: flex; align-items: center; justify-content: center;
        }

        /* Search Box */
        .search-box {
            max-width: 600px; margin: 0 auto 40px; width: 90%;
            position: relative;
        }
        .search-box input {
            width: 100%; padding: 18px 25px;
            border-radius: 20px; border: 2px solid var(--border-color);
            background: var(--input-bg); color: var(--text-main);
            font-size: 16px; outline: none; font-family: 'Outfit';
            box-shadow: var(--shadow);
        }

        /* Grid - 2 files on same line */
        .content { max-width: 1000px; margin: 0 auto; padding: 0 15px 100px; }
        #doc-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 20px;
        }

        /* Paper Card */
        .paper-card {
            background: var(--card-bg);
            border-radius: 24px;
            padding: 12px;
            box-shadow: var(--shadow);
            text-decoration: none;
            color: inherit;
            border: 1px solid var(--border-color);
        }

        .preview-box {
            width: 100%; aspect-ratio: 3/4;
            background: #e2e8f0; border-radius: 18px;
            position: relative; overflow: hidden;
            display: flex; align-items: center; justify-content: center;
            margin-bottom: 12px;
        }

        /* Download Badge on Preview */
        .download-badge {
            position: absolute; bottom: 10px; right: 10px;
            background: rgba(0,0,0,0.6); color: white;
            padding: 4px 10px; border-radius: 12px;
            font-size: 11px; display: flex; align-items: center; gap: 5px;
            backdrop-filter: blur(4px);
        }

        .title {
            font-size: 14px; font-weight: 600; line-height: 1.3;
            margin-bottom: 8px; height: 36px; overflow: hidden;
            display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical;
        }

        .meta-text { font-size: 11px; color: var(--text-sub); display: flex; justify-content: space-between; }
        
        .download-btn {
            margin-top: 12px; width: 100%; padding: 10px;
            background: var(--accent); color: white;
            border-radius: 12px; text-align: center;
            font-size: 13px; font-weight: 600;
        }

        @media (max-width: 480px) {
            #doc-grid { gap: 12px; }
            .logo-text { font-size: 24px; }
            .edu-icon { width: 60px; height: 60px; }
        }
    </style>
</head>
<body>

<button class="theme-toggle" onclick="toggleTheme()" id="themeBtn">
    <svg width="24" height="24" fill="white" viewBox="0 0 24 24"><path d="M12 3v1m0 16v1m9-9h-1M4 9H3m15.364-6.364l-.707.707M6.343 17.657l-.707.707m12.728 0l-.707-.707M6.343 6.343l-.707-.707M12 5b3.866 0 7 3.134 7 7s-3.134 7-7 7-7-3.134-7-7 3.134-7 7-7z"/></svg>
</button>

<header>
    <div class="logo-container">
        <svg class="edu-icon" viewBox="0 0 24 24">
            <path d="M12 3L1 9l11 6 9-4.91V17h2V9L12 3zM3.89 9L12 13.47 20.11 9 12 4.53 3.89 9zM12 16c-2.21 0-4 1.79-4 4h8c0-2.21-1.79-4-4-4z"/>
        </svg>
        <div class="logo-text">eduLEARN</div>
    </div>
    <div class="search-box">
        <input type="text" id="paperSearch" placeholder="Search for papers, subjects...">
    </div>
</header>

<div class="content">
    <div id="doc-grid">
        </div>
</div>

<script src="https://unpkg.com/aos@2.3.1/dist/aos.js"></script>
<script>
    // 1. Data for 20 Files
    const subjects = ["Mathematics", "Biology", "Chemistry", "Physics", "English", "Geography", "History", "Commerce", "Agriculture", "Fine Art"];
    const levels = ["P.7 PLE", "S.4 UCE", "S.6 UACE"];
    const papers = [];

    for(let i=1; i<=20; i++) {
        const sub = subjects[Math.floor(Math.random() * subjects.length)];
        const lvl = levels[Math.floor(Math.random() * levels.length)];
        papers.push({
            id: i,
            name: `${lvl} ${sub} Mock Paper ${2020 + (i%5)}`,
            subject: sub,
            level: lvl,
            downloads: Math.floor(Math.random() * 5000) + 100,
            size: (Math.random() * 3 + 0.5).toFixed(1) + "MB"
        });
    }

    const grid = document.getElementById('doc-grid');

    function render() {
        grid.innerHTML = papers.map(p => `
            <div class="paper-card" data-aos="fade-up">
                <div class="preview-box">
                    <img src="https://via.placeholder.com/300x400/27ae60/ffffff?text=${p.subject}" style="width:100%">
                    <div class="download-badge">
                        <svg width="10" height="10" fill="white" viewBox="0 0 24 24"><path d="M19 9h-4V3H9v6H5l7 7 7-7zM5 18v2h14v-2H5z"/></svg>
                        ${p.downloads}
                    </div>
                </div>
                <div class="title">${p.name}</div>
                <div class="meta-text">
                    <span>${p.level} • ${p.subject}</span>
                    <span>${p.size}</span>
                </div>
                <a href="pdfs/sample.pdf" download class="download-btn">Download PDF</a>
            </div>
        `).join('');
    }

    // 2. Theme Toggle
    function toggleTheme() {
        const body = document.body;
        const current = body.getAttribute('data-theme');
        const newTheme = current === 'dark' ? 'light' : 'dark';
        body.setAttribute('data-theme', newTheme);
        document.getElementById('nav-theme').setAttribute('content', newTheme === 'dark' ? '#0F172A' : '#F8FAF9');
        localStorage.setItem('theme', newTheme);
    }

    // 3. Search Logic
    document.getElementById('paperSearch').oninput = (e) => {
        const term = e.target.value.toLowerCase();
        const cards = document.querySelectorAll('.paper-card');
        cards.forEach(card => {
            const text = card.innerText.toLowerCase();
            card.style.display = text.includes(term) ? 'block' : 'none';
        });
    };

    // Initialize
    window.onload = () => {
        render();
        AOS.init({ duration: 800, once: true });
        
        // Load saved theme
        if(localStorage.getItem('theme') === 'dark') toggleTheme();
    };
</script>

</body>
</html>
