<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="theme-color" id="nav-theme" content="#F8FAF9">
    <title>eduLEARN.ug | Uganda's Digital Library</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600&display=swap" rel="stylesheet">
    <link href="https://unpkg.com/aos@2.3.1/dist/aos.css" rel="stylesheet">
    
    <style>
        :root {
            --bg-color: #F8FAF9; --card-bg: #ffffff; --text-main: #1A1C1E;
            --text-sub: #6C757D; --accent: #27ae60; --border-color: #E9ECEF;
            --shadow: 0 10px 30px rgba(0,0,0,0.05);
        }
        [data-theme="dark"] {
            --bg-color: #0F172A; --card-bg: #1E293B; --text-main: #F8FAFC;
            --text-sub: #94A3B8; --accent: #4ADE80; --border-color: #334155;
        }
        * { box-sizing: border-box; transition: 0.3s; }
        body { font-family: 'Outfit', sans-serif; background: var(--bg-color); margin: 0; color: var(--text-main); }
        header { padding: 40px 15px 20px; text-align: center; }
        .logo-text { font-size: 28px; font-weight: 600; letter-spacing: -1px; }
        .sub-tagline { font-size: 14px; color: var(--accent); margin-bottom: 30px; }
        .search-container { max-width: 500px; margin: 0 auto 40px; width: 92%; position: relative; }
        .search-container input {
            width: 100%; padding: 16px 24px; border-radius: 20px; border: 2px solid var(--border-color);
            background: var(--card-bg); color: var(--text-main); font-size: 16px; outline: none; box-shadow: var(--shadow);
        }
        #search-loader {
            display: none; position: absolute; right: 20px; top: 18px;
            width: 20px; height: 20px; border: 3px solid #eee; border-top: 3px solid var(--accent); border-radius: 50%; animation: spin 0.8s linear infinite;
        }
        @keyframes spin { 100% { transform: rotate(360deg); } }
        .content { max-width: 1100px; margin: 0 auto; padding: 0 15px 100px; }
        #doc-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(160px, 1fr)); gap: 20px; }
        .paper-card {
            background: var(--card-bg); border-radius: 20px; padding: 12px;
            text-decoration: none; color: inherit; border: 1px solid var(--border-color);
            display: flex; flex-direction: column; box-shadow: var(--shadow);
        }
        .paper-card:hover { transform: translateY(-5px); border-color: var(--accent); }
        .preview-box { width: 100%; aspect-ratio: 3/4; background: #f0f0f0; border-radius: 15px; overflow: hidden; margin-bottom: 12px; }
        .title { font-size: 14px; font-weight: 600; line-height: 1.3; height: 36px; overflow: hidden; margin-bottom: 5px; }
        .meta { font-size: 11px; color: var(--text-sub); }
        .theme-toggle { position: fixed; bottom: 25px; right: 25px; width: 50px; height: 50px; border-radius: 15px; background: var(--accent); border: none; cursor: pointer; z-index: 1000; color: white; display: flex; align-items: center; justify-content: center; }
        @media (max-width: 480px) { #doc-grid { grid-template-columns: 1fr 1fr; gap: 12px; } }
    </style>
</head>
<body>

<button class="theme-toggle" onclick="toggleTheme()">🌓</button>

<header>
    <div class="logo-text">eduLEARN.ug</div>
    <div class="sub-tagline">Uganda's Premier Digital Library</div>
    <div class="search-container">
        <input type="text" id="paperSearch" placeholder="Search Biology, P.7, Mathematics...">
        <div id="search-loader"></div>
    </div>
</header>

<div class="content">
    <div id="doc-grid"></div>
</div>

<script src="https://unpkg.com/aos@2.3.1/dist/aos.js"></script>
<script>
    // DATA SOURCE
    const papers = [
        { id: 1, name: "UACE Biology Paper 1", subject: "Biology", level: "S.6 UACE", downloads: "1,240", size: "0.5MB", file: "pdfs/UACE_BIO_I.pdf" },
        { id: 2, name: "S.4 Mathematics P1", subject: "Mathematics", level: "S.4 UCE", downloads: "850", size: "1.1MB", file: "pdfs/math_s4.pdf" },
        { id: 3, name: "S.4 Chemistry Paper 2", subject: "Chemistry", level: "S.4 UCE", downloads: "620", size: "0.9MB", file: "pdfs/chem_s4.pdf" }
    ];

    function render(data = papers) {
        const grid = document.getElementById('doc-grid');
        grid.innerHTML = data.map(p => `
            <a href="preview.html?id=${p.id}" class="paper-card" data-aos="fade-up">
                <div class="preview-box">
                    <img src="https://via.placeholder.com/300x400/27ae60/ffffff?text=${p.subject}" style="width:100%">
                </div>
                <div class="title">${p.name}</div>
                <div class="meta">${p.level} • ${p.size}</div>
            </a>
        `).join('');
    }

    let searchTimeout;
    document.getElementById('paperSearch').oninput = (e) => {
        const term = e.target.value.toLowerCase();
        document.getElementById('search-loader').style.display = "block";
        clearTimeout(searchTimeout);
        searchTimeout = setTimeout(() => {
            const filtered = papers.filter(p => p.name.toLowerCase().includes(term) || p.subject.toLowerCase().includes(term));
            render(filtered);
            document.getElementById('search-loader').style.display = "none";
        }, 800);
    };

    function toggleTheme() {
        const body = document.body;
        const current = body.getAttribute('data-theme');
        body.setAttribute('data-theme', current === 'dark' ? 'light' : 'dark');
    }

    window.onload = () => { render(); AOS.init(); };
</script>
</body>
</html>
