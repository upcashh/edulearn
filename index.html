<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="theme-color" id="nav-theme" content="#F8FAFC">
    <title>eduLEARN.ug | Uganda's Digital Library</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600&display=swap" rel="stylesheet">
    <link href="https://unpkg.com/aos@2.3.1/dist/aos.css" rel="stylesheet">
    
    <style>
        :root {
            /* Modern Tech Palette */
            --bg-color: #F8FAFC; 
            --card-bg: #ffffff; 
            --text-main: #0F172A; 
            --text-sub: #64748B;  
            --accent: #4F46E5;    /* Vibrant Indigo */
            --success: #10B981;   /* Mint Green */
            --border-color: #E2E8F0;
            --shadow: 0 10px 15px -3px rgba(79, 70, 229, 0.05);
            --header-blur: rgba(248, 250, 252, 0.9);
        }

        [data-theme="dark"] {
            --bg-color: #020617; 
            --card-bg: #0F172A; 
            --text-main: #F8FAFC; 
            --text-sub: #94A3B8; 
            --accent: #818CF8; 
            --success: #34D399; 
            --border-color: #1E293B;
            --shadow: 0 20px 25px -5px rgba(0, 0, 0, 0.4);
            --header-blur: rgba(2, 6, 23, 0.9);
        }

        * { box-sizing: border-box; transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1); }
        
        body { 
            font-family: 'Outfit', sans-serif; 
            background-color: var(--bg-color); 
            margin: 0; padding: 0; color: var(--text-main);
            overflow-x: hidden;
            line-height: 1.5;
        }

        /* Modern Sticky Header */
        header { 
            padding: 20px 15px; 
            position: sticky; 
            top: 0; 
            z-index: 100;
            background: var(--header-blur);
            backdrop-filter: blur(16px);
            border-bottom: 1px solid var(--border-color);
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .logo-row {
            display: flex;
            align-items: center;
            gap: 10px;
            margin-bottom: 15px;
        }

        /* SVG Animated Icon */
        .logo-icon {
            width: 35px;
            height: 35px;
            fill: var(--accent);
            animation: bounce 2s infinite ease-in-out;
        }

        @keyframes bounce {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-6px); }
        }

        .logo-text { 
            font-size: 28px; 
            font-weight: 600; 
            letter-spacing: -1px; 
            color: var(--text-main);
        }

        .search-container { 
            max-width: 500px; 
            margin: 0 auto; 
            width: 100%; 
            position: relative; 
        }

        .search-container input {
            width: 100%; 
            padding: 14px 20px 14px 50px; 
            border-radius: 14px; 
            border: 2px solid var(--border-color);
            background: var(--card-bg); 
            color: var(--text-main); 
            font-size: 15px; 
            outline: none; 
            box-shadow: var(--shadow);
        }

        .search-container input:focus {
            border-color: var(--accent);
            box-shadow: 0 0 0 4px rgba(79, 70, 229, 0.1);
        }

        /* Search SVG Icon */
        .search-icon {
            position: absolute;
            left: 18px;
            top: 15px;
            width: 20px;
            height: 20px;
            stroke: var(--text-sub);
            animation: searchShake 5s infinite;
        }

        @keyframes searchShake {
            0%, 90%, 100% { transform: rotate(0); }
            92% { transform: rotate(-10deg); }
            95% { transform: rotate(10deg); }
        }

        #search-loader {
            display: none; position: absolute; right: 18px; top: 15px;
            width: 20px; height: 20px; border: 2px solid #eee; 
            border-top: 2px solid var(--accent); border-radius: 50%; 
            animation: spin 0.8s linear infinite;
        }

        @keyframes spin { 100% { transform: rotate(360deg); } }

        /* Content Grid */
        .content { max-width: 1100px; margin: 30px auto; padding: 0 20px 100px; }
        #doc-grid { 
            display: grid; 
            grid-template-columns: repeat(auto-fill, minmax(180px, 1fr)); 
            gap: 20px; 
        }

        .paper-card {
            background: var(--card-bg); 
            border-radius: 20px; 
            padding: 10px;
            text-decoration: none; 
            color: inherit; 
            border: 1px solid var(--border-color);
            display: flex; 
            flex-direction: column; 
            box-shadow: var(--shadow);
            overflow: hidden;
        }

        .paper-card:hover { 
            transform: scale(1.03); 
            border-color: var(--accent);
            box-shadow: 0 20px 25px -5px rgba(79, 70, 229, 0.1);
        }

        .preview-box { 
            width: 100%; 
            aspect-ratio: 1/1; 
            background: #F1F5F9; 
            border-radius: 14px; 
            overflow: hidden; 
            margin-bottom: 12px; 
            display: flex; 
            align-items: center; 
            justify-content: center;
        }

        .title { 
            font-size: 15px; 
            font-weight: 600; 
            line-height: 1.2; 
            height: 36px; 
            overflow: hidden; 
            margin-bottom: 10px;
            padding: 0 5px;
        }

        .meta-line { 
            padding: 0 5px 5px;
            font-size: 11px; 
            color: var(--text-sub); 
            display: flex; 
            justify-content: space-between;
            align-items: center;
        }

        .badge {
            background: rgba(79, 70, 229, 0.1);
            color: var(--accent);
            padding: 2px 8px;
            border-radius: 6px;
            font-weight: 600;
        }

        /* Floating Theme Toggle */
        .theme-toggle { 
            position: fixed; bottom: 25px; right: 25px; 
            width: 50px; height: 50px; border-radius: 50%; 
            background: var(--accent); border: none; cursor: pointer; 
            z-index: 1000; color: white; display: flex; 
            align-items: center; justify-content: center;
            box-shadow: 0 10px 15px rgba(79, 70, 229, 0.3);
        }

        @media (max-width: 480px) { 
            #doc-grid { grid-template-columns: 1fr 1fr; gap: 12px; }
            .logo-text { font-size: 22px; }
        }
    </style>
</head>
<body>

<button class="theme-toggle" onclick="toggleTheme()" aria-label="Toggle Theme">
    <svg width="20" height="20" fill="currentColor" viewBox="0 0 20 20"><path d="M17.293 13.293A8 8 0 016.707 2.707a8.001 8.001 0 1010.586 10.586z"></path></svg>
</button>

<header>
    <div class="logo-row">
        <svg class="logo-icon" viewBox="0 0 24 24">
            <path d="M12 21l-8-4.5v-9l8 4.5 8-4.5v9l-8 4.5zM12 12l8-4.5-8-4.5-8 4.5 8 4.5z"/>
        </svg>
        <div class="logo-text">eduLEARN<span style="color:var(--accent)">.ug</span></div>
    </div>
    
    <div class="search-container">
        <svg class="search-icon" fill="none" stroke="currentColor" viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z"/>
        </svg>
        <input type="text" id="paperSearch" placeholder="Search Biology, P.7, Mathematics...">
        <div id="search-loader"></div>
    </div>
</header>

<div class="content">
    <div id="doc-grid"></div>
</div>

<script src="https://unpkg.com/aos@2.3.1/dist/aos.js"></script>
<script>
    const papers = [
        { 
            id: 1, 
            name: "UACE Biology Paper 1", 
            subject: "Biology", 
            level: "S.6", 
            size: "0.5MB", 
            file: "pdfs/UACE_BIO_I.pdf",
            preview: "previews/bio.jpg" 
        },
        { 
            id: 2, 
            name: "UCE Math Paper 2", 
            subject: "Math", 
            level: "S.4", 
            size: "1.2MB", 
            file: "pdfs/UCE_MATH_II.pdf",
            preview: "previews/math.jpg" 
        }
    ];

    function render(data = papers) {
        const grid = document.getElementById('doc-grid');
        grid.innerHTML = data.map(p => `
            <a href="preview.html?id=${p.id}" class="paper-card" data-aos="zoom-in">
                <div class="preview-box">
                    <img src="${p.preview}" onerror="this.src='https://via.placeholder.com/300x300/4F46E5/ffffff?text=${p.subject}'" style="width:100%; height:100%; object-fit: cover;">
                </div>
                <div class="title">${p.name}</div>
                <div class="meta-line">
                    <span class="badge">${p.level}</span>
                    <span>${p.size}</span>
                </div>
            </a>
        `).join('');
    }

    document.getElementById('paperSearch').oninput = (e) => {
        const term = e.target.value.toLowerCase();
        const loader = document.getElementById('search-loader');
        loader.style.display = "block";
        
        setTimeout(() => {
            const filtered = papers.filter(p => p.name.toLowerCase().includes(term) || p.subject.toLowerCase().includes(term));
            render(filtered);
            loader.style.display = "none";
        }, 400);
    };

    function toggleTheme() {
        const body = document.body;
        const isDark = body.getAttribute('data-theme') === 'dark';
        const nextTheme = isDark ? 'light' : 'dark';
        body.setAttribute('data-theme', nextTheme);
        document.getElementById('nav-theme').setAttribute('content', nextTheme === 'dark' ? '#020617' : '#F8FAFC');
    }

    window.onload = () => { render(); AOS.init({ duration: 600, once: true }); };
</script>

</body>
</html>
